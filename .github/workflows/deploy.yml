name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ec2-user/apps/thrayam-threads
          git pull origin main

          cd backend
          npm install
          pm2 restart thrayam-backend

          cd ../frontend
          npm install
          npm run build

          sudo systemctl reload nginx
