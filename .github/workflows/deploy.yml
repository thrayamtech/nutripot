name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------- CHECKOUT CODE ----------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- SETUP NODE ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ---------- BUILD FRONTEND ----------
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # ---------- DEPLOY FRONTEND ----------
      - name: Upload Frontend Build to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/build/*"
          target: "/home/ec2-user/apps/thrayam-threads/frontend/build"
          recursive: true

      # ---------- DEPLOY BACKEND ----------
      - name: Deploy Backend & Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/apps/thrayam-threads
            git pull origin main

            cd backend
            npm install
            pm2 restart thrayam-backend || pm2 start index.js --name thrayam-backend

      # ---------- RELOAD NGINX ----------
      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl reload nginx
